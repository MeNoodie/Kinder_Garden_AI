# ollama models - text model, vision model
# google models - text model, vision model
# groq models - text model, speech transcription
# huggingface - image generation

text:
  models:
    gemini-2.5-flash:
      provider: google

    glm-5.2:cloud:
      provider: ollama

    openai/gpt-oss-120b:
      provider: groq

vision:
  models:
    gemini-2.5-pro:
      provider: google

    llava:
      provider: ollama

speech:
  models:
    whisper-large-v3:
      provider: groq

image_generation:
  models:
    black-forest-labs/FLUX.1-schnell:
      provider: huggingface
